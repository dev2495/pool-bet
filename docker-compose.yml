services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: poolbet
      POSTGRES_PASSWORD: poolbet
      POSTGRES_DB: poolbet
    ports:
      - "5432:5432"
    volumes:
      - poolbet_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poolbet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  poolbet_db:
